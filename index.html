<!DOCTYPE html>
<html>
<head>
<title>Josh's GitHub Repo</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color:#f5f7fb;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    width:500px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    color:#2c3e50;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
}

.rollbox{
    background:#eef3ff;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    font-size:16px;
}

.time{
    margin-top:25px;
    padding:15px;
    background:#f1f1f1;
    border-radius:8px;
    font-weight:bold;
}

.footer{
    margin-top:20px;
    font-size:14px;
    color:#888;
}
</style>
</head>

<body>

<div class="card">

<h1>Welcome to Josh's GitHub Repo</h1>
<p class="subtitle">This page shows student details and the current date & time.</p>

<h3>Student Roll Numbers</h3>

<div class="rollbox">Roll Number: 23PA1A05H1</div>
<div class="rollbox">Roll Number: 23PA1A05I1</div>

<div class="time">
Current Date & Time
<p id="datetime"></p>
</div>

<div class="footer">
Created by Josh
</div>

</div>
<p>This page is updated.</p>
<script>
function updateTime(){
    const now = new Date();
    document.getElementById("datetime").innerHTML = now.toLocaleString();
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
